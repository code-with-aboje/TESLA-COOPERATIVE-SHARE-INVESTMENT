<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Crest Point</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--r:#CC0000;--rd:#a00000;--bg:#080808;--g1:#0f0f0f;--g2:#161616;--g3:#1e1e1e;--line:rgba(255,255,255,0.07);--T:#f5f5f5;--M:#888;--dim:#555}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--T);min-height:100vh;font-size:14px}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spin{width:36px;height:36px;border:3px solid var(--g3);border-top:3px solid var(--r);border-radius:50%;animation:sp .9s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(8,8,8,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000}
.logo{font-size:16px;font-weight:700;color:var(--T);letter-spacing:.5px}.logo span{color:var(--r)}
.hdr-right{display:flex;align-items:center;gap:12px}
.menu-btn{background:none;border:none;color:var(--T);cursor:pointer;padding:8px;border-radius:6px;transition:.2s}
.menu-btn:hover{background:var(--g2)}
.user-av{width:30px;height:30px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.logout-btn{padding:7px 14px;background:var(--r);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
.logout-btn:hover{background:var(--rd)}
.sidebar{position:fixed;top:56px;left:-260px;width:260px;height:calc(100vh - 56px);background:var(--g1);border-right:1px solid var(--line);transition:left .3s;z-index:999;padding:20px 0}
.sidebar.open{left:0}
.nav-item{padding:0 16px;margin-bottom:2px}
.nav-link{display:flex;align-items:center;gap:10px;padding:11px 14px;color:var(--M);text-decoration:none;font-size:13px;font-weight:500;border-radius:8px;transition:.2s;cursor:pointer}
.nav-link:hover,.nav-link.active{background:rgba(204,0,0,.12);color:var(--T)}
.nav-link.active{border-left:2px solid var(--r);padding-left:12px}
.nav-icon{font-size:15px;width:18px;text-align:center}
.main{margin-top:56px;min-height:calc(100vh - 56px);transition:margin-left .3s}
.main.shift{margin-left:260px}
.content-frame{width:100%;height:calc(100vh - 56px);border:none;display:none}
.content-frame.active{display:block}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;display:none}
.overlay.active{display:block}
.hidden{display:none!important}
@media(max-width:768px){.main.shift{margin-left:0}.sidebar{width:100%;left:-100%}}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spin"></div><span style="color:var(--M);font-size:13px">Authenticating…</span></div>
<div id="app" class="hidden">
  <header class="header">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">CREST<span>POINT</span> <span style="font-size:10px;color:var(--M);font-weight:400">Admin</span></div>
    </div>
    <div class="hdr-right">
      <div class="user-av" id="userAv">AD</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="nav-item"><a class="nav-link active" data-page="dashboard" onclick="nav(this,'dashboard','./admin-dashboard.html')"><span class="nav-icon">📊</span> Dashboard</a></div>
    <div class="nav-item"><a class="nav-link" data-page="users" onclick="nav(this,'users','./users-management.html')"><span class="nav-icon">👥</span> Users</a></div>
    <div class="nav-item"><a class="nav-link" data-page="payments" onclick="nav(this,'payments','./payment-methods.html')"><span class="nav-icon">💳</span> Payment Methods</a></div>
    <div class="nav-item"><a class="nav-link" data-page="bans" onclick="nav(this,'bans','./band-users.html')"><span class="nav-icon">🚫</span> Banned Users</a></div>
    <div class="nav-item"><a class="nav-link" data-page="settings" onclick="nav(this,'settings','./admin-settings.html')"><span class="nav-icon">⚙️</span> Settings</a></div>
  </nav>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <main class="main" id="main">
    <iframe class="content-frame active" id="frame-dashboard"></iframe>
    <iframe class="content-frame" id="frame-users"></iframe>
    <iframe class="content-frame" id="frame-payments"></iframe>
    <iframe class="content-frame" id="frame-bans"></iframe>
    <iframe class="content-frame" id="frame-settings"></iframe>
  </main>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,get}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
import{getAuth,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import firebaseConfig from'./firebaseConfig.js';
const app=initializeApp(firebaseConfig),db=getDatabase(app),auth=getAuth(app);
const $=id=>document.getElementById(id);

window.toggleSidebar=()=>{$('sidebar').classList.toggle('open');$('main').classList.toggle('shift');$('overlay').classList.toggle('active')};
window.closeSidebar=()=>{$('sidebar').classList.remove('open');$('main').classList.remove('shift');$('overlay').classList.remove('active')};

window.nav=(el,page,src)=>{
  document.querySelectorAll('.nav-link').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.content-frame').forEach(f=>f.classList.remove('active'));
  const frame=$(`frame-${page}`);
  if(frame){frame.classList.add('active');if(!frame.src||frame.src==='about:blank')frame.src=src;}
  if(window.innerWidth<=768)closeSidebar();
};

window.logout=()=>{if(confirm('Logout?'))signOut(auth).then(()=>location.href='./login-admin.html')};

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='./login-admin.html';return}
  const snap=await get(ref(db,`users/${user.uid}`));
  if(!snap.exists()||snap.val().role!=='admin'){alert('Access denied');location.href='./login-admin.html';return}
  const d=snap.val();
  const init=(d.name||'Admin').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  $('userAv').textContent=init;
  $('loadingScreen').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('frame-dashboard').src='./admin-dashboard.html';
});
</script>
</body>
</html>
