<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--r:#CC0000;--rd:#a00000;--bg:#080808;--g1:#0f0f0f;--g2:#161616;--g3:#1e1e1e;--line:rgba(255,255,255,0.07);--T:#f5f5f5;--M:#888;--dim:#555}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--T);padding:28px 24px;font-size:14px}
.welcome{background:linear-gradient(135deg,var(--r),var(--rd));border-radius:14px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.welcome::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,.06);border-radius:50%}
.welcome h1{font-size:22px;font-weight:700;margin-bottom:3px}
.welcome p{font-size:13px;opacity:.85}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--g1);border:1px solid var(--line);border-radius:12px;padding:20px;transition:.2s}
.card:hover{border-color:rgba(204,0,0,.4);transform:translateY(-2px)}
.card-val{font-size:30px;font-weight:700;color:var(--r);font-variant-numeric:tabular-nums;margin-bottom:4px}
.card-lbl{font-size:12px;color:var(--M);text-transform:uppercase;letter-spacing:1px}
.card-icon{width:36px;height:36px;background:rgba(204,0,0,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:600;color:var(--M);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:16px;height:2px;background:var(--r)}
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.user-row{background:var(--g1);border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.u-name{font-weight:600;font-size:13px;margin-bottom:2px}
.u-email{font-size:11px;color:var(--M)}
.u-bal{font-size:14px;font-weight:700;color:var(--r)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--g3);border-top:2px solid var(--r);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="welcome"><h1>Admin Dashboard</h1><p id="adminName">Loading…</p></div>
<div class="grid">
  <div class="card"><div class="card-icon">👥</div><div class="card-val" id="totalUsers"><span class="spin"></span></div><div class="card-lbl">Total Users</div></div>
  <div class="card"><div class="card-icon">💰</div><div class="card-val" id="totalBal"><span class="spin"></span></div><div class="card-lbl">Total Balance</div></div>
  <div class="card"><div class="card-icon">⏳</div><div class="card-val" id="pendingW"><span class="spin"></span></div><div class="card-lbl">Pending Withdrawals</div></div>
  <div class="card"><div class="card-icon">📥</div><div class="card-val" id="pendingF"><span class="spin"></span></div><div class="card-lbl">Pending Funding</div></div>
</div>

<div class="sec-title">Recent Users</div>
<div class="users-grid" id="recentUsers"><div style="color:var(--M);font-size:13px"><span class="spin"></span></div></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,onValue}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import firebaseConfig from'./firebaseConfig.js';
const app=initializeApp(firebaseConfig),db=getDatabase(app),auth=getAuth(app);
const fmt=n=>`₦${(n||0).toLocaleString('en-NG',{minimumFractionDigits:0})}`;
onAuthStateChanged(auth,user=>{
  if(!user)return;
  document.getElementById('adminName').textContent=user.email||'Admin';
  let users={},withdrawals={},fundings={};
  const update=()=>{
    const uArr=Object.values(users);
    document.getElementById('totalUsers').textContent=uArr.length;
    document.getElementById('totalBal').textContent=fmt(uArr.reduce((s,u)=>s+(parseFloat(u.balance)||0),0));
    document.getElementById('pendingW').textContent=Object.values(withdrawals).filter(w=>w.status==='pending').length;
    document.getElementById('pendingF').textContent=Object.values(fundings).filter(f=>f.status==='pending').length;
    const recent=uArr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,6);
    document.getElementById('recentUsers').innerHTML=recent.map(u=>`
      <div class="user-row">
        <div><div class="u-name">${u.fullName||u.name||'User'}</div><div class="u-email">${u.email||''}</div></div>
        <div class="u-bal">${fmt(u.balance)}</div>
      </div>`).join('');
  };
  onValue(ref(db,'users'),s=>{users=s.val()||{};update()});
  onValue(ref(db,'pendingWithdrawals'),s=>{withdrawals=s.val()||{};update()});
  onValue(ref(db,'fundingRequests'),s=>{fundings=s.val()||{};update()});
});
</script>
</body>
</html>
