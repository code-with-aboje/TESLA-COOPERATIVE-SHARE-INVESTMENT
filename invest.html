<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Cooperative — Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --red:#e8192c;--red2:#c0111f;--red3:#ff3347;
  --bg:#080a0c;--bg2:#0d1014;--bg3:#12171c;
  --glass:rgba(232,25,44,0.10);--glass2:rgba(255,255,255,0.04);
  --border:rgba(232,25,44,0.25);--border2:rgba(255,255,255,0.07);
  --txt:#f0f2f5;--txt2:#8a9bb0;--txt3:#c5cdd8;
  --sidebar:220px;
  --topnav-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}

body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* ---- AUTH LOADER ---- */
.auth-loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
.auth-loader.hidden{display:none}
.loader-logo{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.loader-logo svg{width:40px;height:40px;animation:logoSpin 2s ease-in-out infinite}
@keyframes logoSpin{0%,100%{filter:drop-shadow(0 0 8px rgba(232,25,44,.4))}50%{filter:drop-shadow(0 0 20px rgba(232,25,44,.8))}}
.loader-brand{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.loader-brand span{color:var(--red)}
.loader-ring{width:44px;height:44px;border:3px solid rgba(232,25,44,.15);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--txt2)}

/* ---- MAIN LAYOUT ---- */
.shell{display:flex;height:100vh;width:100%;position:relative;z-index:1;flex-direction:column}

/* ============ TOP NAV ============ */
.top-nav{
  position:relative;
  z-index:100;
  background:linear-gradient(180deg,var(--bg2) 0%,rgba(13,16,20,0.97) 100%);
  border-bottom:1px solid var(--border2);
  /* Bottom radius pill shape */
  border-radius:0 0 28px 28px;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 2px 0 var(--border) inset;
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:var(--topnav-h);
  flex-shrink:0;
  /* Glow accent on bottom edge */
  filter:drop-shadow(0 6px 18px rgba(232,25,44,.12));
}

/* Subtle red glow line along bottom curve */
.top-nav::after{
  content:'';
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:60%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  border-radius:0 0 50% 50%;
  opacity:.6;
}

/* Brand section */
.tn-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tn-logo svg{width:28px;height:28px;filter:drop-shadow(0 0 6px rgba(232,25,44,.5))}
.tn-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase}
.tn-name span{color:var(--red)}
.tn-slash{color:var(--border);margin:0 2px;font-weight:300}
.tn-page{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2)}

/* Nav pills row */
.tn-pills{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--border2);border-radius:16px;padding:5px 6px}
.tn-item{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;
  border-radius:11px;
  cursor:pointer;
  color:var(--txt2);
  font-size:12px;font-weight:600;letter-spacing:.4px;
  transition:.2s;border:1px solid transparent;
  white-space:nowrap;
  text-decoration:none;
  font-family:'Exo 2',sans-serif;
}
.tn-item i{font-size:13px}
.tn-item:hover{background:var(--glass2);color:var(--txt3)}
.tn-item.active{
  background:var(--glass);
  color:var(--txt);
  border-color:var(--border);
  box-shadow:0 0 12px rgba(232,25,44,.15);
}
.tn-item.active i{color:var(--red)}

/* Right side: user + bell */
.tn-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tn-bell{position:relative;width:34px;height:34px;border-radius:10px;background:var(--glass2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);font-size:13px;transition:.2s}
.tn-bell:hover{border-color:var(--border);color:var(--txt)}
.tn-badge{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg2)}
.tn-user{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:12px;cursor:pointer;border:1px solid var(--border2);background:var(--glass2);transition:.2s}
.tn-user:hover{border-color:var(--border)}
.tn-avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--red2),var(--red));display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.5px}
.tn-uname{font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.3px}

/* ============ BODY BELOW NAV ============ */
.body-wrap{display:flex;flex:1;overflow:hidden;min-height:0}

/* ---- SIDEBAR (desktop) ---- */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;transition:.3s}
.sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--red),transparent);opacity:.3}
.sb-nav{flex:1;padding:16px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-track{background:transparent}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.sb-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;color:var(--txt2);transition:.2s;border:1px solid transparent;font-size:13px;font-weight:500;letter-spacing:.3px;text-decoration:none}
.sb-item:hover{background:var(--glass2);color:var(--txt3);border-color:var(--border2)}
.sb-item.active{background:var(--glass);color:var(--txt);border-color:var(--border)}
.sb-item.active i{color:var(--red)}
.sb-item i{width:18px;text-align:center;font-size:15px;transition:.2s}
.sb-divider{height:1px;background:var(--border2);margin:10px 14px}
.sb-footer{padding:14px 10px;border-top:1px solid var(--border2)}
.sb-logout{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;color:var(--txt2);transition:.2s;font-size:13px;font-weight:500;border:1px solid transparent;width:100%;background:none}
.sb-logout:hover{background:rgba(232,25,44,.08);color:var(--red);border-color:var(--border)}

/* ---- CONTENT / IFRAME ---- */
.content-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.iframe-wrap{flex:1;overflow:hidden;position:relative}
.content-frame{width:100%;height:100%;border:none;background:var(--bg);display:block;transition:opacity .25s ease}
.content-frame.loading{opacity:0;pointer-events:none}

/* ---- PAGE LOADER OVERLAY ---- */
.page-loader{
  position:absolute;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
  z-index:50;
  opacity:0;pointer-events:none;
  transition:opacity .2s ease;
}
.page-loader.visible{opacity:1;pointer-events:all}

/* Top progress bar */
.pl-bar{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:rgba(232,25,44,.12);
  overflow:hidden;
  border-radius:0 0 3px 3px;
}
.pl-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--red2),var(--red),var(--red3));
  box-shadow:0 0 12px var(--red);
  border-radius:3px;
  transition:width .08s linear;
  animation:none;
}

/* Center spinner + label */
.pl-center{display:flex;flex-direction:column;align-items:center;gap:16px}
.pl-ring-wrap{position:relative;width:56px;height:56px}
.pl-ring{
  width:56px;height:56px;
  border-radius:50%;
  border:2px solid rgba(232,25,44,.12);
  border-top-color:var(--red);
  animation:spin .75s linear infinite;
}
.pl-ring-inner{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:32px;height:32px;
  border-radius:50%;
  border:2px solid rgba(232,25,44,.08);
  border-bottom-color:rgba(232,25,44,.5);
  animation:spin 1.1s linear infinite reverse;
}
.pl-icon{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:var(--red);font-size:14px;
  animation:iconPulse 1.5s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(.9)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.pl-label{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--txt2)}
.pl-page-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt);margin-top:-6px}
.pl-page-name span{color:var(--red)}

/* ---- CHAT BUTTON ---- */
.chat-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:14px;background:var(--red);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 24px rgba(232,25,44,.35);transition:.2s;z-index:99}
.chat-btn:hover{background:var(--red3);transform:translateY(-2px);box-shadow:0 12px 32px rgba(232,25,44,.5)}

/* ---- CHAT MODAL ---- */
.chat-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(8px);padding:16px}
@media(min-width:600px){.chat-modal{align-items:center}}
.chat-modal.active{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.chat-box{width:100%;max-width:480px;height:70vh;max-height:600px;background:var(--bg3);border:1px solid var(--border);border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s ease;position:relative}
@media(min-width:600px){.chat-box{border-radius:20px}}
.chat-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.chat-head{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.chat-head-left{display:flex;align-items:center;gap:12px}
.chat-icon{width:34px;height:34px;background:rgba(232,25,44,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:15px}
.chat-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px}
.chat-sub{font-size:10px;color:var(--txt2);margin-top:1px}
.chat-close{width:30px;height:30px;background:var(--glass2);border:1px solid var(--border2);border-radius:7px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s}
.chat-close:hover{border-color:var(--border);color:var(--txt)}
.chat-iframe-wrap{flex:1;position:relative;overflow:hidden}
.chat-iframe{width:100%;height:100%;border:none;display:block}
.chat-loading{position:absolute;inset:0;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.chat-loading.hidden{display:none}
.chat-spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
.chat-loading-txt{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--txt2)}

/* ---- RESPONSIVE ---- */
@media(max-width:960px){
  .tn-pills .tn-item span{display:none}
  .tn-item{padding:8px 11px}
  .tn-uname{display:none}
}
@media(max-width:768px){
  .sidebar{display:none}
  .tn-pills{gap:2px;padding:4px}
  .tn-item{padding:7px 10px}
  .chat-btn{bottom:20px;right:16px;width:46px;height:46px;font-size:18px}
}
@media(max-width:520px){
  .tn-bell{display:none}
  .top-nav{padding:0 12px}
  .tn-brand .tn-slash,.tn-page{display:none}
}
</style>
</head>
<body>

<!-- AUTH LOADER -->
<div class="auth-loader" id="authLoader">
  <div class="loader-logo">
    <svg viewBox="0 0 342 512" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 55.2L170.7 512 341.5 55.2c-55.9 16.7-129.1 25.4-170.7 25.4C129.1 80.6 55.9 71.9 0 55.2zm0 0C62.3 36.8 136.7 0 170.7 0c34 0 108.4 36.8 170.8 55.2z" fill="#E8192C"/></svg>
    <div class="loader-brand"><span>TESLA</span> COOPERATIVE</div>
  </div>
  <div class="loader-ring"></div>
  <div class="loader-txt">Authenticating…</div>
</div>

<!-- MAIN SHELL -->
<div class="shell" id="mainContainer" style="display:none">

  <!-- ===== TOP NAV ===== -->
  <nav class="top-nav">

    <!-- Brand -->
    <div class="tn-brand">
      <div class="tn-logo">
        <svg viewBox="0 0 342 512" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 55.2L170.7 512 341.5 55.2c-55.9 16.7-129.1 25.4-170.7 25.4C129.1 80.6 55.9 71.9 0 55.2zm0 0C62.3 36.8 136.7 0 170.7 0c34 0 108.4 36.8 170.8 55.2z" fill="#E8192C"/></svg>
      </div>
      <div class="tn-name"><span>TESLA</span></div>
      <span class="tn-slash">/</span>
      <span class="tn-page" id="pageTitle">Home</span>
    </div>

    <!-- Nav pills -->
    <div class="tn-pills">
      <a class="tn-item active" data-page="./dashboard.html" data-title="Home"><i class="fas fa-home"></i><span>Home</span></a>
      <a class="tn-item" data-page="plans.html" data-title="Invest"><i class="fas fa-chart-line"></i><span>Invest</span></a>
      <a class="tn-item" data-page="withdraw.html" data-title="Withdraw"><i class="fas fa-wallet"></i><span>Withdraw</span></a>
      <a class="tn-item" data-page="transactions.html" data-title="Transactions"><i class="fas fa-list-ul"></i><span>Txns</span></a>
      <a class="tn-item" data-page="referrals.html" data-title="Referrals"><i class="fas fa-network-wired"></i><span>Referrals</span></a>
      <a class="tn-item" data-page="profile.html" data-title="Profile"><i class="fas fa-user"></i><span>Profile</span></a>
      <a class="tn-item" data-page="settings.html" data-title="Settings"><i class="fas fa-gear"></i><span>Settings</span></a>
      <a class="tn-item" data-page="support.html" data-title="Support"><i class="fas fa-headset"></i><span>Support</span></a>
    </div>

    <!-- Right: bell + user -->
    <div class="tn-right">
      <div class="tn-bell"><i class="fas fa-bell"></i><span class="tn-badge"></span></div>
      <div class="tn-user">
        <div class="tn-avatar" id="avatarText">TC</div>
        <div class="tn-uname" id="headerUserName">Investor</div>
      </div>
    </div>

  </nav>

  <!-- ===== BODY ===== -->
  <div class="body-wrap">

    <!-- SIDEBAR (desktop only, secondary nav) -->
    <aside class="sidebar">
      <nav class="sb-nav">
        <a class="sb-item active" data-page="./dashboard.html" data-title="Home"><i class="fas fa-home"></i> Home</a>
        <a class="sb-item" data-page="plans.html" data-title="Invest"><i class="fas fa-chart-line"></i> Invest</a>
        <a class="sb-item" data-page="withdraw.html" data-title="Withdraw"><i class="fas fa-wallet"></i> Withdraw</a>
        <a class="sb-item" data-page="transactions.html" data-title="Transactions"><i class="fas fa-list-ul"></i> Transactions</a>
        <a class="sb-item" data-page="referrals.html" data-title="Referrals"><i class="fas fa-network-wired"></i> Referrals</a>
        <div class="sb-divider"></div>
        <a class="sb-item" data-page="profile.html" data-title="Profile"><i class="fas fa-user"></i> Profile</a>
        <a class="sb-item" data-page="settings.html" data-title="Settings"><i class="fas fa-gear"></i> Settings</a>
        <a class="sb-item" data-page="support.html" data-title="Support"><i class="fas fa-headset"></i> Support</a>
      </nav>
      <div class="sb-footer">
        <button class="sb-logout" onclick="handleLogout()"><i class="fas fa-right-from-bracket" style="width:18px;text-align:center"></i> Log Out</button>
      </div>
    </aside>

    <!-- CONTENT -->
    <div class="content-wrap">
      <div class="iframe-wrap">
        <!-- Page transition loader -->
        <div class="page-loader" id="pageLoader">
          <div class="pl-bar"><div class="pl-bar-fill" id="plBarFill"></div></div>
          <div class="pl-center">
            <div class="pl-ring-wrap">
              <div class="pl-ring"></div>
              <div class="pl-ring-inner"></div>
              <i class="fas fa-bolt pl-icon"></i>
            </div>
            <div class="pl-label">Loading</div>
            <div class="pl-page-name" id="plPageName">Home</div>
          </div>
        </div>
        <iframe class="content-frame" id="contentFrame" src="./dashboard.html"></iframe>
      </div>
    </div>

  </div>
</div>

<!-- CHAT BUTTON -->
<button class="chat-btn" id="chatButton" title="Chat with support"><i class="fas fa-comments"></i></button>

<!-- CHAT MODAL -->
<div class="chat-modal" id="chatModal">
  <div class="chat-box">
    <div class="chat-head">
      <div class="chat-head-left">
        <div class="chat-icon"><i class="fas fa-headset"></i></div>
        <div>
          <div class="chat-title">Support Chat</div>
          <div class="chat-sub">We're here to help</div>
        </div>
      </div>
      <button class="chat-close" id="chatCloseBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="chat-iframe-wrap">
      <div class="chat-loading" id="chatLoading">
        <div class="chat-spin"></div>
        <div class="chat-loading-txt">Loading chat…</div>
      </div>
      <iframe class="chat-iframe" id="chatIframe"></iframe>
    </div>
  </div>
</div>

<script type="module" src="./lib/firebase.js"></script>
<script type="module" src="./assets/js/userStatusDisplay.js"></script>
<script type="module" src="./assets/js/funding-modal.js"></script>
<script type="module" src="./assets/js/withdraw-modal.js"></script>

<script type="module">
import{onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
import{auth,database}from"./lib/firebase.js";

const authLoader=document.getElementById('authLoader');
const mainContainer=document.getElementById('mainContainer');
const headerUserName=document.getElementById('headerUserName');
const avatarText=document.getElementById('avatarText');
const chatButton=document.getElementById('chatButton');
const chatModal=document.getElementById('chatModal');
const chatIframe=document.getElementById('chatIframe');
const chatLoading=document.getElementById('chatLoading');
const chatCloseBtn=document.getElementById('chatCloseBtn');
const contentFrame=document.getElementById('contentFrame');
const pageTitle=document.getElementById('pageTitle');
const allNavItems=[...document.querySelectorAll('.tn-item'),...document.querySelectorAll('.sb-item')];

window.addEventListener('message',e=>{
  if(!e.data||typeof e.data!=='object'||e.data.h!==undefined)return;
  if(e.data.type==='OPEN_FUNDING_MODAL'&&window.openFundingModal)window.openFundingModal();
  if(e.data.type==='OPEN_WITHDRAW_MODAL'&&window.openWithdrawModal)window.openWithdrawModal();
});

onAuthStateChanged(auth,async user=>{
  if(user){
    try{
      const snap=await get(ref(database,'users/'+user.uid));
      if(snap.exists()){
        const d=snap.val();
        const name=d.fullName||user.email.split('@')[0]||'Investor';
        headerUserName.textContent=name;
        avatarText.textContent=name.split(' ').map(w=>w.charAt(0)).join('').toUpperCase().slice(0,2);
      }
    }catch(e){console.error('Error loading user:',e)}
    authLoader.classList.add('hidden');
    mainContainer.style.display='flex';
  }else window.location.href='/login';
});

window.handleLogout=async()=>{
  try{const{getAuth}=await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js");await getAuth().signOut();window.location.href='/login'}catch(e){console.error(e)}
};

let chatLoaded=false;
chatButton.addEventListener('click',()=>{
  chatModal.classList.add('active');
  if(!chatLoaded){
    chatIframe.src='ChatBot.html';
    chatIframe.onload=()=>setTimeout(()=>chatLoading.classList.add('hidden'),500);
    chatIframe.onerror=()=>{chatLoading.innerHTML='<div style="color:var(--red);text-align:center"><i class="fas fa-exclamation-circle" style="font-size:28px;margin-bottom:8px"></i><div style="font-size:12px">Failed to load chat</div></div>'};
    chatLoaded=true;
  }
});
chatCloseBtn.addEventListener('click',()=>chatModal.classList.remove('active'));
chatModal.addEventListener('click',e=>{if(e.target===chatModal)chatModal.classList.remove('active')});

/* ---- IFRAME PAGE LOADER ---- */
const pageLoader=document.getElementById('pageLoader');
const plBarFill=document.getElementById('plBarFill');
const plPageName=document.getElementById('plPageName');
let barTimer=null;

function startPageLoader(title){
  // Show loader
  pageLoader.classList.add('visible');
  contentFrame.classList.add('loading');
  plPageName.textContent=title||'Loading';
  // Animate progress bar: quickly to ~80%, then stall waiting for onload
  plBarFill.style.width='0%';
  let pct=0;
  clearInterval(barTimer);
  barTimer=setInterval(()=>{
    if(pct<75){pct+=Math.random()*8+3}
    else if(pct<90){pct+=0.5}
    plBarFill.style.width=Math.min(pct,90)+'%';
  },120);
}

function finishPageLoader(){
  clearInterval(barTimer);
  plBarFill.style.transition='width .3s ease';
  plBarFill.style.width='100%';
  setTimeout(()=>{
    pageLoader.classList.remove('visible');
    contentFrame.classList.remove('loading');
    plBarFill.style.transition='';
    plBarFill.style.width='0%';
  },350);
}

// Hook into iframe load
contentFrame.addEventListener('load',()=>finishPageLoader());

// Show loader on initial dashboard load too
startPageLoader('Home');

function handleNav(item){
  const page=item.getAttribute('data-page');
  const title=item.getAttribute('data-title');
  allNavItems.forEach(n=>n.classList.remove('active'));
  allNavItems.filter(n=>n.getAttribute('data-page')===page).forEach(n=>n.classList.add('active'));
  pageTitle.textContent=title;
  startPageLoader(title);
  contentFrame.src=page;
}
allNavItems.forEach(item=>item.addEventListener('click',()=>handleNav(item)));
</script>
