<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Investment Plans — Tesla Cooperative</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --R:#CC0000;--Rg:rgba(204,0,0,0.15);--Rb:rgba(204,0,0,0.06);
  --bg:#111318;--g1:#1a1d24;--g2:#21252e;--g3:#2a2f3a;
  --line:rgba(255,255,255,0.10);--T:#f5f5f5;--M:#9aa3b0;--dim:#555;
  --gold:#C9A84C;--green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--T);min-height:100vh;padding-bottom:100px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* HERO */
.hero{position:relative;z-index:1;background:var(--g1);border-bottom:1px solid var(--line);padding:28px 20px 22px;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--R),transparent 60%)}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--R);text-transform:uppercase;margin-bottom:8px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,10vw,76px);letter-spacing:2px;line-height:.88;margin-bottom:16px}
.hero-title span{color:var(--R)}
.bal-inner{display:inline-flex;flex-direction:column;background:var(--g2);border:1px solid var(--line);border-radius:12px;padding:10px 16px}
.bal-l{font-size:10px;letter-spacing:2px;color:var(--M);text-transform:uppercase;margin-bottom:3px}
.bal-v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green);letter-spacing:1px}
.banner{display:none;align-items:center;gap:8px;border-radius:8px;padding:8px 12px;font-size:12px;margin-top:10px}
.banner.show{display:flex}
.banner-err{background:var(--Rb);border:1px solid rgba(204,0,0,0.2);color:#ff7070}
.banner-warn{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.2);color:var(--gold)}

/* PLANS */
.plans-wrap{position:relative;z-index:1;padding:20px}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--M);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}

/* CARD */
.plan-card{background:var(--g1);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}
.plan-card:hover{transform:translateY(-3px);border-color:rgba(204,0,0,0.4)}
.plan-card.featured{border-color:rgba(204,0,0,0.28)}
.card-band{padding:16px 18px 14px;display:flex;align-items:flex-start;justify-content:space-between;position:relative;overflow:hidden}
.band-default{background:linear-gradient(135deg,#1e2229,#252b35)}
.band-featured{background:linear-gradient(135deg,#2a1010,#321515)}
.plan-num{font-family:'Bebas Neue',sans-serif;font-size:60px;color:rgba(255,255,255,0.05);line-height:1;position:absolute;right:10px;bottom:-6px;letter-spacing:-2px}
.plan-tier{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px}
.plan-tier-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--M);margin-bottom:3px}
.plan-badge{background:var(--R);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}
.plan-badge.gold{background:var(--gold);color:#000}
.card-body{padding:14px 18px 18px}
.cost-label{font-size:10px;letter-spacing:1.5px;color:var(--M);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:2px}
.cost-range{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--M)}
.cost-range span{color:var(--T);font-size:22px}
.daily-row{display:flex;align-items:center;gap:8px;background:var(--Rb);border:1px solid rgba(204,0,0,0.18);border-radius:8px;padding:8px 11px;margin:10px 0}
.daily-row i{color:var(--R);font-size:11px}
.daily-row span{font-size:12px;color:var(--M)}
.daily-row strong{font-family:'DM Mono',monospace;color:var(--T);margin-left:auto;font-size:13px}
.rec-tag{font-size:11px;color:var(--M);background:var(--g2);border:1px solid var(--line);border-radius:6px;padding:5px 9px;margin-bottom:10px;line-height:1.5}
.rec-tag i{color:var(--gold);margin-right:4px;font-size:10px}
.divider{height:1px;background:var(--line);margin:12px 0}
.feat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.feat{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--M)}
.feat::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--R);flex-shrink:0}
.invest-btn{width:100%;padding:12px;background:var(--R);border:none;border-radius:10px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.invest-btn:hover{background:#a80000;box-shadow:0 4px 20px rgba(204,0,0,0.3)}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{border-top-color:var(--R);border-color:var(--Rb);width:12px;height:12px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:769px){.hero{padding:38px 40px 26px}.plans-wrap{padding:28px 40px}}
@media(min-width:1024px){.hero,.plans-wrap{max-width:1200px;margin:0 auto}}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">// Investment Plans</div>
  <div class="hero-title">CHOOSE<br><span>YOUR</span> PLAN</div>
  <div class="bal-inner">
    <div class="bal-l">Available Balance</div>
    <div class="bal-v" id="balance"><span class="spinner spinner-sm" style="width:16px;height:16px"></span></div>
  </div>
  <div class="banner banner-err" id="errorBanner"><i class="fas fa-times-circle"></i>&nbsp;<span id="errorMsg"></span></div>
  <div class="banner banner-warn" id="warningBanner"><i class="fas fa-exclamation-triangle"></i>&nbsp;<span id="warningMsg"></span></div>
</div>

<!-- PLANS -->
<div class="plans-wrap">
  <div class="section-label">// Select a Plan</div>
  <div class="plans-grid" id="grid"></div>
</div>

<script type="module">
import{onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import{ref,get,update,push}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
import{auth,database}from"./lib/firebase.js";

/* ── PLAN DEFINITIONS ── */
// earnings: [min_daily, max_daily] shown on card; income_pct used in modal for live calc
const P={
  starter: {name:'Starter', min:200,  max:500,   recs:[200,300,500],    rec:'Great for beginners',      earnings:[10,20],   income_pct:.055, dur:'30 days'},
  bronze:  {name:'Bronze',  min:500,  max:700,   recs:[500,600,700],    rec:'Most popular choice',      earnings:[25,35],   income_pct:.058, dur:'30 days'},
  silver:  {name:'Silver',  min:700,  max:1500,  recs:[700,1000,1500],  rec:'Steady mid-range returns', earnings:[35,60],   income_pct:.062, dur:'30 days'},
  gold:    {name:'Gold',    min:1500, max:4000,  recs:[1500,2500,4000], rec:'Best value for growth',    earnings:[60,150],  income_pct:.068, dur:'30 days', featured:1,badge:'Best Value',goldBadge:1},
  platinum:{name:'Platinum',min:4000, max:10000, recs:[4000,7000,10000],rec:'Elite high-yield tier',    earnings:[150,400], income_pct:.075, dur:'30 days', badge:'Elite'},
};
const planOrder=['starter','bronze','silver','gold','platinum'];
const badges={starter:'Beginner',bronze:'Popular',gold:'Best Value',platinum:'Elite'};
const fmt=n=>`$${Number(n).toLocaleString('en-US',{minimumFractionDigits:2})}`;
const fmtShort=n=>n>=1000?`$${n/1000}K`:`$${n}`;

let user,bal=0,userData={};

const el=id=>document.getElementById(id);
const showErr=m=>{el('errorMsg').textContent=m;el('errorBanner').classList.add('show')};
const showWarn=m=>{el('warningMsg').textContent=m;el('warningBanner').classList.add('show')};

/* ── RENDER CARDS ── */
const render=()=>{
  const g=el('grid');g.innerHTML='';
  planOrder.forEach((id,i)=>{
    const c=P[id];
    const num=String(i+1).padStart(2,'0');
    const badge=c.badge||badges[id]||'';
    const card=document.createElement('div');
    card.className='plan-card'+(c.featured?' featured':'');
    card.innerHTML=`
      <div class="card-band ${c.featured?'band-featured':'band-default'}">
        <div><div class="plan-tier-sub">${num}</div><div class="plan-tier">${c.name}</div></div>
        ${badge?`<span class="plan-badge${c.goldBadge?' gold':''}">${badge}</span>`:''}
        <div class="plan-num">${num}</div>
      </div>
      <div class="card-body">
        <div class="cost-label">Investment Range</div>
        <div class="cost-range"><span>${fmtShort(c.min)}</span> — <span>${fmtShort(c.max)}</span></div>
        <div class="daily-row"><i class="fas fa-coins"></i><span>Daily Income</span><strong>~$${c.earnings[0]}–$${c.earnings[1]}/day</strong></div>
        <div class="rec-tag"><i class="fas fa-star"></i>${c.rec}</div>
        <div class="divider"></div>
        <div class="feat-list">
          <div class="feat">Duration: ${c.dur}</div>
          <div class="feat">Claim earnings anytime</div>
          <div class="feat">Auto-completes at maturity</div>
          <div class="feat">24/7 Support</div>
        </div>
        <button class="invest-btn" data-plan-id="${id}"><i class="fas fa-rocket"></i> INVEST NOW</button>
      </div>`;
    // Attach click via event delegation to avoid inline onclick issues
    card.querySelector('.invest-btn').addEventListener('click',()=>openPlan(id));
    g.appendChild(card);
  });
};

/* ── AUTH ── */
onAuthStateChanged(auth,async u=>{
  if(!u){showWarn('Not logged in.');el('balance').textContent='$0.00';user=null;bal=0;render();return;}
  user=u;
  const s=await get(ref(database,'users/'+u.uid));
  if(s.exists()){userData=s.val();bal=userData.balance||0;}
  el('balance').textContent=fmt(bal);
  render();
});

/* ── OPEN PLAN — send to PARENT via postMessage ── */
/* The modal lives in the parent (invest.html) to avoid iframe viewport clipping */
function openPlan(id){
  const plan=P[id];
  // Send full plan data + current balance to parent
  window.parent.postMessage({
    type:'OPEN_INVEST_MODAL',
    planId:id,
    plan:{
      name:plan.name,
      min:plan.min,
      max:plan.max,
      recs:plan.recs,
      rec:plan.rec,
      income_pct:plan.income_pct,
      earnings:plan.earnings,
      dur:plan.dur
    },
    balance:bal,
    uid:user?user.uid:null
  },'*');
}

/* ── LISTEN FOR RESULTS FROM PARENT ── */
/* Parent does the DB write and sends back the result */
window.addEventListener('message',e=>{
  if(!e.data||typeof e.data!=='object')return;

  // Parent confirmed investment success — update balance display
  if(e.data.type==='INVEST_SUCCESS'){
    bal=e.data.newBalance;
    el('balance').textContent=fmt(bal);
  }

  // Parent confirmed investment success AND it was the first investment
  if(e.data.type==='INVEST_SUCCESS_FIRST'){
    bal=e.data.newBalance;
    el('balance').textContent=fmt(bal);
  }
});
</script>
</body>
</html>
