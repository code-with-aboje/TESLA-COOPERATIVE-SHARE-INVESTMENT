<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Settings — Tesla Cooperative</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e3000f;--red-dim:#a80009;--red-glow:rgba(227,0,15,0.22);--bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:rgba(255,255,255,0.07);--text:#f0f0f0;--muted:#666}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 20px 100px}

.page-header{margin-bottom:28px}
.breadcrumb{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.breadcrumb span{color:var(--red)}
.page-header h1{font-family:'Orbitron',sans-serif;font-size:clamp(20px,5vw,32px);font-weight:900;letter-spacing:1px}
.page-header h1 em{color:var(--red);font-style:normal}
.page-header p{color:var(--muted);font-size:14px;margin-top:6px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red)}
.card.danger-card::before{background:linear-gradient(90deg,#991b1b,var(--red))}

.card-head{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.card-icon{width:44px;height:44px;border-radius:10px;background:rgba(227,0,15,0.12);border:1px solid rgba(227,0,15,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--red);flex-shrink:0}
.card-icon.danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2);color:#ef4444}
.card-head h2{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:1px;font-weight:700;margin-bottom:3px}
.card-head p{color:var(--muted);font-size:13px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:500;transition:border-color .2s,box-shadow .2s}
.form-input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}

.btn{width:100%;padding:13px;border:none;border-radius:9px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--red-dim);box-shadow:0 0 18px var(--red-glow)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover:not(:disabled){background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.4)}
.btn-danger:disabled{opacity:.5;cursor:not-allowed}

.alert{display:none;padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border:1px solid}
.alert.show{display:block}
.alert-success{background:rgba(29,185,84,0.08);border-color:rgba(29,185,84,0.25);color:#1db954}
.alert-error{background:rgba(227,0,15,0.08);border-color:rgba(227,0,15,0.25);color:#ff8a8a}

.divider{height:1px;background:var(--border);margin:16px 0}
.logout-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.grid{grid-template-columns:1fr}body{padding:20px 16px 100px}}
@media(min-width:769px){body{padding:32px 40px 80px}}
@media(min-width:1024px){body{max-width:900px;margin:0 auto;padding:40px 60px 80px}}
</style>
</head>
<body>

<div class="page-header">
  <div class="breadcrumb">Tesla Cooperative / <span>Settings</span></div>
  <h1>Account <em>Settings</em></h1>
  <p>Manage your account and security preferences</p>
</div>

<div class="grid">
  <!-- Change Password -->
  <div class="card">
    <div class="card-head">
      <div class="card-icon"><i class="fas fa-lock"></i></div>
      <div>
        <h2>Password</h2>
        <p>Update your login password</p>
      </div>
    </div>
    <div class="alert" id="passwordAlert"></div>
    <form id="changePasswordForm">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" class="form-input" id="currentPassword" placeholder="Enter current password" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="newPassword" placeholder="Enter new password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm new password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="changePasswordBtn">
        <i class="fas fa-check"></i> Update Password
      </button>
    </form>
  </div>

  <!-- Logout -->
  <div class="card danger-card">
    <div class="card-head">
      <div class="card-icon danger"><i class="fas fa-sign-out-alt"></i></div>
      <div>
        <h2>Logout</h2>
        <p>Sign out from your account</p>
      </div>
    </div>
    <div class="alert" id="logoutAlert"></div>
    <div class="divider"></div>
    <p class="logout-desc">Signing out will end your current session. You'll need to log in again to access your account.</p>
    <button id="logoutBtn" class="btn btn-danger">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</div>

<script type="module">
import{getAuth,onAuthStateChanged,updatePassword,reauthenticateWithCredential,EmailAuthProvider,signOut}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import{auth}from"./lib/firebase.js";

let currentUser=null;
onAuthStateChanged(auth,u=>{if(!u)location.href='/login';else currentUser=u;});

function showAlert(id,msg,type){
  const el=document.getElementById(id);
  el.textContent=msg;el.className=`alert show alert-${type}`;
  setTimeout(()=>el.classList.remove('show'),5000);
}

document.getElementById('changePasswordForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const cur=document.getElementById('currentPassword').value;
  const np=document.getElementById('newPassword').value;
  const cp=document.getElementById('confirmPassword').value;
  const btn=document.getElementById('changePasswordBtn');
  if(np!==cp)return showAlert('passwordAlert','Passwords do not match','error');
  if(np.length<6)return showAlert('passwordAlert','Password must be at least 6 characters','error');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Updating…';
  try{
    const cred=EmailAuthProvider.credential(currentUser.email,cur);
    await reauthenticateWithCredential(currentUser,cred);
    await updatePassword(currentUser,np);
    showAlert('passwordAlert','Password updated successfully!','success');
    document.getElementById('changePasswordForm').reset();
  }catch(err){
    if(err.code==='auth/wrong-password')showAlert('passwordAlert','Current password is incorrect','error');
    else if(err.code==='auth/weak-password')showAlert('passwordAlert','Password is too weak','error');
    else showAlert('passwordAlert','Error: '+err.message,'error');
  }finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Update Password';}
});

document.getElementById('logoutBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('logoutBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Logging out…';
  try{await signOut(auth);location.href='/login';}
  catch(err){showAlert('logoutAlert','Error logging out: '+err.message,'error');btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-out-alt"></i> Logout';}
});
</script>
</body>
</html>
